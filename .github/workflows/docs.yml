name: Generated Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload generated docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs-site
          path: site
          retention-days: 14
