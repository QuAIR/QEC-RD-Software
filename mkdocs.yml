site_name: QEC-RD-Software
site_description: Research and engineering backbone for quantum error correction workflows.
repo_url: https://github.com/QuAIR/QEC-RD-Software
repo_name: QuAIR/QEC-RD-Software
site_url: https://quairkit.com/QEC-RD-Software/
docs_dir: docs
site_dir: site
use_directory_urls: true

nav:
  - Home: index.md
  - End-to-End Demos:
      - Overview: demos/index.md
      - Built-in Repetition Memory: demos/builtin-repetition-memory.md
      - Rotated Surface SI1000: demos/rotated-surface-si1000.md
      - Imported Stim Circuit: demos/imported-stim-circuit.md
      - Custom Decoder Hook: demos/custom-decoder-hook.md
      - Sweep and Analysis Report: demos/sweep-analysis-report.md
  - Repo Skills:
      - Overview: superpowers/skills/index.md
      - Acceptance: superpowers/skills/qec-rd-acceptance/SKILL.md
      - Running Memory Experiments: superpowers/skills/qec-rd-running-memory-experiments/SKILL.md
      - Importing Stim Circuits: superpowers/skills/qec-rd-importing-stim-circuits/SKILL.md
      - Integrating Custom Decoders: superpowers/skills/qec-rd-integrating-custom-decoders/SKILL.md
      - Stage 1 Guardrails: superpowers/skills/qec-rd-stage1-guardrails/SKILL.md
  - API Reference:
      - Overview: api/index.md
      - Public API: api/public-api.md
      - Core Models: api/core.md
      - Kernel Modules: api/kernel.md
  - Stage 1 Backbone:
      - English Spec: superpowers/specs/2026-04-20-qec-rd-platform-backbone-design-en.md
      - Chinese Spec: superpowers/specs/2026-04-20-qec-rd-platform-backbone-design.md
      - Implementation Plan: superpowers/plans/2026-04-20-qec-rd-stage1-backbone-implementation.md
      - Three-Person Plan: superpowers/plans/2026-04-21-qec-rd-stage1-3person-execution.md
      - Workstream B Plan: superpowers/plans/2026-04-22-qec-rd-workstream-b-plan.md

theme:
  name: mkdocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
